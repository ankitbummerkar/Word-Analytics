<!doctype html>
<html lang="en" class="transition duration-300">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Analytics</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen"
  >
    <div>
      <button
        id="toggleTheme"
        class="fixed top-4 right-4 bg-white dark:bg-white hover:scale-110 text-white font-bold py-2 px-4 rounded"
      >
        🌙
      </button>
      <!-- header -->
      <div
        class="bg-blue-800 dark:bg-black text-center py-12 px-4 transition duration-300"
      >
        <h1
          class="text-4xl md:text-6xl font-bold text-white dark:text-gray-100 transition duration-300"
        >
          WORD ANALYTICS
        </h1>

        <p class="mt-3 text-sm md:text-base text-gray-100 dark:text-gray-300">
          Simple real-time text analytics dashboard
        </p>
      </div>
    </div>

    <!-- main container -->
    <div class="max-w-6xl px-4 py-8 mx-auto border-2 border-gray-300 mt-8 rounded-lg bg-white dark:bg-gray-800 transition duration-300 shadow-lg dark:shadow-gray-700">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8  ">

        <!-- left side -->
        <div class="border-2 border-r border-gray-300 rounded-lg p-4 ">
          <div class="flex justify-between items-center mb-4  ">
            <div>
              <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">
                Text Editor
              </h2>
              <p class="text-sm text-gray-500 dark:text-gray-400">
                Type your text below
              </p>
            </div>

            <span
              class="rounded-full py-2 px-4 bg-blue-600 text-white text-sm border-2 border-blue
              ">

            
              Live
            <span/>
          </div>

          <textarea
            id="textInput"
            class="w-full h-48 p-2 border rounded-lg bg-gray-200 dark:bg-gray-700 dark:text-white  focus:outline-none resize-none transition duration-300"
            placeholder="Start typing..."
          ></textarea>
        </div>


        <!-- right grid -->

        <div class="grid grid-cols-2  border ">
             <div
          class="p-6 border border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center ">
          <div class="text-4xl mb-3 ">
            📝
          </div>
          <h2 id="wordCount"
            class="text-4xl font-bold text-gray-800 dark:text-white">
            0
          </h2>
          <p
            class="mt-2 text-sm text-gray-500 dark:text-gray-400">
            Words
          </p>

        </div>
               <div
          class="p-6 border border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center ">
          <div class="text-4xl mb-3">
            🔤
          </div>
          <h2 id="charCount"
            class="text-4xl font-bold text-gray-800 dark:text-white">
            0
          </h2>
          <p
            class="mt-2 text-sm text-gray-500 dark:text-gray-400">
            Characters
          </p>

        </div>
               <div
          class="p-6 border border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center">
          <div class="text-4xl mb-3">
            🎤
          </div>
          <h2 id="VowelCount"
            class="text-4xl font-bold text-gray-800 dark:text-white">
            0
          </h2>
          <p
            class="mt-2 text-sm text-gray-500 dark:text-gray-400">
            Vowels
          </p>

        </div>
               <div
          class="p-6 border border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center">
          <div class="text-4xl mb-3">
             📄
          </div>
          <h2 id="sentenceCount"
            class="text-4xl font-bold text-gray-800 dark:text-white">
            0
          </h2>
          <p
            class="mt-2 text-sm text-gray-500 dark:text-gray-400">
            Sentences
          </p>

        </div>
  
       
        </div>
      </div>
    </div>
  </body>
    <script src="script.js" ></script>

</html>
